<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Software Modeling Workbench Icon</title>
  <desc id="desc">A square design workbench icon with drafting board, ruler, and UML nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="208" fill="url(#bg)" />

  <g filter="url(#soft-shadow)">
    <rect x="206" y="188" width="612" height="462" rx="34" fill="#f8fafc" />
    <rect x="206" y="188" width="612" height="72" rx="34" fill="url(#desk)" />
    <rect x="248" y="302" width="368" height="30" rx="15" fill="#cbd5e1" />
    <rect x="248" y="350" width="292" height="24" rx="12" fill="#e2e8f0" />
    <rect x="248" y="394" width="216" height="24" rx="12" fill="#e2e8f0" />

    <rect x="642" y="302" width="134" height="220" rx="20" fill="#dbeafe" stroke="#2563eb" stroke-width="12" />
    <line x1="670" y1="338" x2="748" y2="338" stroke="#2563eb" stroke-width="10" stroke-linecap="round" />
    <line x1="670" y1="378" x2="748" y2="378" stroke="#2563eb" stroke-width="10" stroke-linecap="round" />
    <line x1="670" y1="418" x2="748" y2="418" stroke="#2563eb" stroke-width="10" stroke-linecap="round" />
    <line x1="670" y1="458" x2="748" y2="458" stroke="#2563eb" stroke-width="10" stroke-linecap="round" />

    <rect x="260" y="540" width="160" height="86" rx="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="10" />
    <rect x="468" y="540" width="160" height="86" rx="18" fill="#cffafe" stroke="#0891b2" stroke-width="10" />
    <rect x="676" y="540" width="110" height="86" rx="18" fill="#e0e7ff" stroke="#4f46e5" stroke-width="10" />
    <line x1="420" y1="583" x2="468" y2="583" stroke="#334155" stroke-width="10" stroke-linecap="round" />
    <line x1="628" y1="583" x2="676" y2="583" stroke="#334155" stroke-width="10" stroke-linecap="round" />
  </g>

  <g>
    <rect x="180" y="688" width="664" height="66" rx="20" fill="#334155" />
    <rect x="252" y="744" width="56" height="168" rx="18" fill="#0f172a" />
    <rect x="716" y="744" width="56" height="168" rx="18" fill="#0f172a" />
  </g>

  <g>
    <circle cx="290" cy="224" r="10" fill="#e2e8f0" />
    <circle cx="324" cy="224" r="10" fill="#e2e8f0" />
    <circle cx="358" cy="224" r="10" fill="#e2e8f0" />
  </g>
</svg>
